<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Leadership | Indo German Sports Academy</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
font-family:Arial, Helvetica, sans-serif;
background:#19e4eb;
color:#fff;
}

/* HEADER */

header{
display:flex;
align-items:center;
justify-content:space-between;
padding:10px 40px;
background:#081d33;
}

header img{
height:55px;
}

.back-btn{
background:#f5b400;
color:#000;
padding:8px 16px;
border-radius:5px;
text-decoration:none;
font-weight:bold;
}

/* HERO */

.hero{
text-align:center;
padding:80px 20px;
background:#0b2746;
}

.hero h1{
font-size:42px;
margin-bottom:10px;
}

/* SECTION */

section{
padding:60px 40px;
}

/* GRID */

.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(260px,1fr));
gap:30px;
max-width:1200px;
margin:auto;
}

/* CARD */

.card{
background:#112f4f;
padding:40px 20px;
border-radius:15px;
text-align:center;
transition:0.3s;
}

.card:hover{
transform:translateY(-8px);
}

.card img{
width:120px;
height:120px;
border-radius:50%;
object-fit:cover;
margin-bottom:15px;
border:4px solid white;
}

.card h3{
margin:10px 0 5px;
}

.card p{
font-size:14px;
opacity:0.9;
}

.leader-link{
text-decoration:none;
color:white;
}

/* FOOTER */

footer{
background:#081d33;
text-align:center;
padding:25px;
margin-top:40px;
}

/* MOBILE */

@media(max-width:768px){

section{
padding:40px 20px;
}

.grid{
grid-template-columns:1fr;
}

}

</style>
</head>

<body>

<header>

<img src="logo.jpeg">

<a href="index.html" class="back-btn">⬅ Back to Home</a>

</header>


<div class="hero">

<h1>Our Leadership</h1>

<p>Meet the experienced professionals guiding Indo German Sports Academy.</p>

</div>


<section>

<div class="grid">

<a href="vksingh.html" class="leader-link">
<div class="card">

<img src="vk.png">

<h3>VK Singh</h3>
<p>Co-Founder</p>

</div>
</a>


<div class="card">

<img src="an.png">

<h3>Anand Singh</h3>
<p>Co-Founder</p>

</div>


<div class="card">

<img src="ba.png">

<h3>Guruji Gautam Rishi</h3>
<p>Co-Founder</p>

</div>


<a href="indranilbasu.html" class="leader-link">
<div class="card">

<img src="ib.png">

<h3>Indranil Basu</h3>
<p>CEO</p>

</div>
</a>


<div class="card">

<img src="https://images.unsplash.com/photo-1603415526960-f7e0328c63b1">

<h3>International Advisor</h3>

</div>

</div>

</section>


<footer>

<p>Indo German Sports Academy</p>

<p>Where Indian Talent Meets German Excellence</p>

</footer>

</body>
</html>
